# =============================================================================
# SoftConnect 2.0 — Docker Compose PRODUÇÃO
# Ambiente: api.hub.softconnect.net.br
# Deploy: Docker Swarm via Portainer (stack: softconnect-prod)
# Trigger: GitHub Actions ao fazer push na branch `main`
# =============================================================================

version: "3.8"

services:
  softconnect-api:
    # Imagem publicada pelo GitHub Actions no GitHub Container Registry
    image: ghcr.io/softcominnovation/softconnect:latest
    networks:
      - network_public
    environment:
      - NODE_ENV=production
      # Hostname = nome do serviço Docker da stack postgres_prod na network_public
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD_PROD}@postgres_prod:5432/whatshub?schema=public
      # Hostname = nome do serviço Docker da stack redis_prod na network_public
      - REDIS_URL=redis://redis_prod:6379/0
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_JWT_EXPIRY=86400
      - DEFAULT_RATE_LIMIT=100
      - PROXY_TIMEOUT_MS=15000
      - PROXY_MAX_RETRIES=1
      - CIRCUIT_BREAKER_THRESHOLD=5
      - CIRCUIT_BREAKER_RESET_MS=30000
      - AUDIT_FLUSH_INTERVAL_MS=1000
      - AUDIT_FLUSH_BATCH_SIZE=100
      - DEFAULT_ADAPTER_TYPE=evolution
      - RUNTIME_MODE=api
      # --- System Monitor do Hub (opcional) ---
      # - HUB_MONITOR_URL=${HUB_MONITOR_URL}
      # - HUB_MONITOR_API_KEY=${HUB_MONITOR_API_KEY}
    deploy:
      mode: replicated
      replicas: 2
      placement:
        constraints:
          - node.role == manager
        # Descomente abaixo quando tiver múltiplos nodes para garantir HA real:
        # max_replicas_per_node: 1
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
      update_config:
        parallelism: 1          # atualiza 1 réplica por vez (zero-downtime)
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        # Traefik — roteamento PRODUÇÃO
        - traefik.enable=true
        - traefik.docker.network=network_public
        - traefik.http.routers.softconnect-prod.rule=Host(`api.hub.softconnect.net.br`)
        - traefik.http.routers.softconnect-prod.entrypoints=websecure
        - traefik.http.routers.softconnect-prod.tls.certresolver=letsencryptresolver
        - traefik.http.services.softconnect-prod.loadbalancer.server.port=3000
        - traefik.http.services.softconnect-prod.loadbalancer.passHostHeader=true
        - traefik.http.routers.softconnect-prod.service=softconnect-prod

  softconnect-worker:
    image: ghcr.io/softcominnovation/softconnect:latest
    command: ["node", "dist/main-worker-batch"]
    networks:
      - network_public
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD_PROD}@postgres_prod:5432/whatshub?schema=public
      - REDIS_URL=redis://redis_prod:6379/0
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - RUNTIME_MODE=worker-batch
      - WORKER_CONCURRENCY=10
      - DEFAULT_ADAPTER_TYPE=evolution
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

networks:
  network_public:
    external: true
    name: network_public

