# =============================================================================
# SoftConnect 2.0 — CI/CD Pipeline PRODUÇÃO
# Trigger: push na branch `main`
# Ação: build imagem Docker → push GHCR
# Deploy: manual via Portainer (Stacks → softconnect-prod → Update → Re-pull image)
# Subdomínio: api.hub.softconnect.net.br
# =============================================================================

name: Deploy → Produção

on:
  push:
    branches:
      - main
    paths:
      - '**'

jobs:
  build-and-push:
    name: Build & Push (prod)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configura o Docker Buildx (builder multi-plataforma com cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Faz login no GitHub Container Registry (GHCR)
      # O GITHUB_TOKEN é gerado automaticamente — não precisa de secret manual
      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Extrai metadados para geração automática de tags e labels da imagem
      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/softconnect
          tags: |
            type=raw,value=latest
            type=sha,prefix=prod-,format=short

      # 5. Build da imagem Docker e push para o GHCR
      - name: Build e Push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. Resumo no summary do workflow
      - name: Resumo
        run: |
          echo "## ✅ Imagem de Produção publicada" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`main\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Imagem:** \`ghcr.io/${{ github.repository_owner }}/softconnect:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 👉 Próximo passo — deploy manual" >> $GITHUB_STEP_SUMMARY
          echo "1. Acesse o Portainer" >> $GITHUB_STEP_SUMMARY
          echo "2. Stacks → \`softconnect-prod\`" >> $GITHUB_STEP_SUMMARY
          echo "3. **Update the stack** → marque ✅ Re-pull image → **Deploy**" >> $GITHUB_STEP_SUMMARY
