# =============================================================================
# SoftConnect 2.0 — CI/CD Pipeline DESENVOLVIMENTO
# Trigger: push na branch `develop`
# Ação: build imagem Docker → push GHCR
# Deploy: manual via Portainer (Stacks → softconnect-dev → Update → Re-pull image)
# Subdomínio: dev-api.hub.softconnect.net.br
# =============================================================================

name: Deploy → Desenvolvimento

on:
  push:
    branches:
      - develop
    paths:
      - '**'

jobs:
  build-and-push:
    name: Build & Push (dev)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/softconnect
          tags: |
            type=raw,value=dev
            type=sha,prefix=dev-,format=short

      - name: Build e Push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumo
        run: |
          echo "## 🔧 Imagem de Desenvolvimento publicada" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`develop\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Imagem:** \`ghcr.io/${{ github.repository_owner }}/softconnect:dev\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 👉 Próximo passo — deploy manual" >> $GITHUB_STEP_SUMMARY
          echo "1. Acesse o Portainer" >> $GITHUB_STEP_SUMMARY
          echo "2. Stacks → \`softconnect-dev\`" >> $GITHUB_STEP_SUMMARY
          echo "3. **Update the stack** → marque ✅ Re-pull image → **Deploy**" >> $GITHUB_STEP_SUMMARY
